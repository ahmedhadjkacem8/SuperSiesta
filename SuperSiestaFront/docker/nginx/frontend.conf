server {
    listen 80;
    server_name siestaofficiel.com demo.siestaofficiel.com;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---- Security headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- gzip ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ---- Health ----
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ---- API Proxy ----
    location ^~ /api {
        proxy_pass http://api-nginx:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for long-running API requests
        proxy_read_timeout 120;
        proxy_connect_timeout 120;
    }

    # ---- Storage Proxy (for images) ----
    location ^~ /storage {
        proxy_pass http://api-nginx:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Legacy Uploads Proxy ----
    location ^~ /uploads {
        proxy_pass http://api-nginx:80;
        proxy_set_header Host $host;
    }

    # ---- Assets ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|ttf|eot|woff2?)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ---- SPA ----
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ---- Security ----
    location ~ /\. {
        deny all;
    }
}