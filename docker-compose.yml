# ============================================================
# SuperSiesta — Docker Compose (App + Frontend only)
# Connexion à DATABASE LOCALE (host.docker.internal)
# ============================================================

services:

  # 1. BACKEND (Laravel)
  api:
    build:
      context:    ./SuperSiestaApi
      dockerfile: Dockerfile
      target:     production
    container_name: supersiesta_api
    restart: unless-stopped
    env_file: ./SuperSiestaApi/.env.docker
    # Permet de joindre MySQL sur Windows
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - api_storage:/var/www/html/storage
      - api_logs:/var/www/html/storage/logs
      #- ./SuperSiestaApi:/var/www/html
      # Mappage direct pour les images (uploads)
      - ./SuperSiestaApi/storage/app/public:/var/www/html/storage/app/public

  # 2. NGINX FOR API
  api-nginx:
    image: nginx:alpine
    container_name: supersiesta_api_nginx
    restart: unless-stopped
    volumes:
      - ./SuperSiestaApi/docker/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
      - ./SuperSiestaApi/public:/var/www/html/public:ro
      # Important: permet à Nginx de lire les images via le lien symbolique public/storage
      - ./SuperSiestaApi/storage/app/public:/var/www/html/storage/app/public:ro
    ports:
      - "${API_PORT:-8000}:80"
    depends_on:
      - api

  # 3. FRONTEND (React)
  front:
    build:
      context:    ./SuperSiestaFront
      dockerfile: Dockerfile
      target:     production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://135.125.202.39:8000/api}
    container_name: supersiesta_front
    restart: unless-stopped
    ports:
      - "${FRONT_PORT:-80}:80"
    depends_on:
      - api-nginx


  # 4. JENKINS
  jenkins:
    build:
      context: .
      dockerfile: ./docker/jenkins/Dockerfile
    container_name: supersiesta_jenkins
    restart: unless-stopped
    ports:
      - "${JENKINS_PORT:-8080}:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    # On Windows, we need to make sure the socket is accessible. 
    # Usually Docker Desktop handles this, but sometimes permissions are needed.

volumes:
  api_storage:
  api_logs:
  jenkins_home:
