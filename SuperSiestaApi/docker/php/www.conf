; ============================================================
; PHP-FPM Pool — www (optimised for containerised deployment)
; ============================================================

[www]
user  = appuser
group = appgroup

listen = 0.0.0.0:9000
listen.owner = appuser
listen.group = appgroup

; Dynamic process management
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests      = 500

; Logging
access.log           = /proc/self/fd/2
php_admin_flag[log_errors] = on
php_admin_value[error_log]  = /proc/self/fd/2

; Security: clear environment
clear_env = no
