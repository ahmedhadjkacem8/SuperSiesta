server {
    listen      80;
    server_name siestaofficiel.com demo.siestaofficiel.com;
    root        /var/www/html/public;
    index       index.php index.html;
    client_max_body_size 500M;

    # ---- Security headers ----
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    charset utf-8;

    # ---- Health-check endpoint ----
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ---- Static assets ----
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?|svg|webp)$ {
        expires     1y;
        access_log  off;
        add_header  Cache-Control "public, immutable";
        add_header  Access-Control-Allow-Origin "*" always;
        add_header  Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header  Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
    }

    # Serve uploaded files under /storage/<path>
    # Uses alias to point directly to the shared Docker volume path
    location ^~ /storage/ {
        alias /var/www/html/storage/app/public/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
        try_files $uri =404;
    }

    # Serve legacy uploaded files under /uploads/<path>
    location ^~ /uploads/ {
        alias /var/www/html/public/uploads/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
        try_files $uri =404;
    }

    # ---- Laravel router ----
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---- PHP-FPM passthrough ----
    location ~ \.php$ {
        fastcgi_pass            api:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_read_timeout    120;
        fastcgi_buffer_size     128k;
        fastcgi_buffers         4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ---- Block hidden files ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
